<!DOCTYPE html>

            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;

        }
        nav {
            margin: 10px 0;
        }
        nav a {

            color: #ffffff;

                margin: 5px 0;
            }
        }
